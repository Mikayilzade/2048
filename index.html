<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#f7f4ea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="2048">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <title>2048 — 4×4</title>

  <style>
    :root {
      --bg: #f7f4ea;
      --text: #776f66;
      --board: #b9aa9c;
      --empty: #cec4b9;
      --button: #9f826d;
      --accent: #f77d5c;
      --gap: 10px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background: var(--bg);
      color: var(--text);
    }

    body {
      position: fixed;
      inset: 0;
      height: 100dvh;
      padding:
        max(18px, env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(14px, env(safe-area-inset-left));
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      touch-action: none;
    }

    button {
      font: inherit;
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(94vw, 520px);
      height: 100%;
      margin: 0 auto;
      overflow: hidden;
      touch-action: none;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, .92fr) minmax(0, 1.28fr);
      gap: 10px;
      align-items: end;
      width: 100%;
    }

    .brand {
      min-width: 0;
    }

    h1 {
      margin: 0;
      min-width: 0;
      font-size: clamp(58px, 17vw, 94px);
      line-height: .86;
      font-weight: 500;
      letter-spacing: -5px;
      white-space: nowrap;
    }

    .game-state-action {
      display: block;
      width: 100%;
      margin: 10px 0 0;
      padding: 5px 3px;
      border-radius: 8px;
      background: transparent;
      color: var(--button);
      font-size: clamp(12px, 3.4vw, 15px);
      line-height: 1.15;
      text-align: left;
    }

    .game-state-action:active {
      background: rgba(159, 130, 109, .10);
    }

    .game-state-action.game-over {
      color: #b14d3e;
      font-weight: 700;
      font-size: clamp(14px, 4vw, 18px);
    }

    .stats {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      min-width: 0;
      width: 100%;
      padding: 8px 6px 10px;
      border-radius: 11px;
      background: var(--board);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .label {
      display: block;
      font-size: 13px;
      text-transform: uppercase;
    }

    .value {
      display: block;
      width: 100%;
      margin-top: 5px;
      font-size: clamp(20px, 6.1vw, 28px);
      line-height: 1;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .value[data-digits="6"] { font-size: clamp(18px, 5.3vw, 25px); }
    .value[data-digits="7"] { font-size: clamp(16px, 4.6vw, 22px); }
    .value[data-digits="8"] { font-size: clamp(14px, 4.0vw, 20px); }
    .value[data-digits="9"] { font-size: clamp(13px, 3.6vw, 18px); }

    .controls {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin: 12px 0 14px;
    }

    .icon-button {
      width: 52px;
      height: 52px;
      padding: 0;
      border-radius: 11px;
      background: var(--button);
      color: white;
      font-size: 30px;
      font-weight: 600;
      line-height: 1;
      box-shadow: 0 2px 0 rgba(0,0,0,.08);
    }

    .icon-button:active {
      transform: translateY(1px);
    }

    .icon-button:disabled {
      opacity: .42;
    }

    .board-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .board {
      width: 100%;
      height: 100%;
      padding: var(--gap);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: var(--gap);
      border-radius: 12px;
      background: var(--board);
    }

    .cell {
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      border-radius: 8px;
      background: var(--empty);
      font-weight: 500;
      font-size: clamp(30px, 10vw, 58px);
      line-height: 1;
      transition: background-color 100ms ease, transform 100ms ease;
      font-variant-numeric: tabular-nums;
    }

    .cell[data-digits="3"] { font-size: clamp(26px, 8.5vw, 50px); }
    .cell[data-digits="4"] { font-size: clamp(22px, 7vw, 42px); }
    .cell[data-digits="5"] { font-size: clamp(18px, 5.8vw, 34px); }

    .cell.pop { animation: pop .16s ease-out; }
    .cell.new { animation: appear .14s ease-out; }

    .board.move-left .cell:not(:empty) { animation: glide-left .14s cubic-bezier(.22,.72,.28,1); }
    .board.move-right .cell:not(:empty) { animation: glide-right .14s cubic-bezier(.22,.72,.28,1); }
    .board.move-up .cell:not(:empty) { animation: glide-up .14s cubic-bezier(.22,.72,.28,1); }
    .board.move-down .cell:not(:empty) { animation: glide-down .14s cubic-bezier(.22,.72,.28,1); }

    @keyframes glide-left { from { transform: translateX(11px); } to { transform: translateX(0); } }
    @keyframes glide-right { from { transform: translateX(-11px); } to { transform: translateX(0); } }
    @keyframes glide-up { from { transform: translateY(11px); } to { transform: translateY(0); } }
    @keyframes glide-down { from { transform: translateY(-11px); } to { transform: translateY(0); } }
    @keyframes pop { 50% { transform: scale(1.11); } }
    @keyframes appear {
      from { transform: scale(.35); opacity: .25; }
      to { transform: scale(1); opacity: 1; }
    }

    .hint {
      margin: 18px 8px 0;
      text-align: center;
      font-size: 16px;
      line-height: 1.35;
      opacity: .82;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(28px, env(safe-area-inset-bottom));
      z-index: 60;
      max-width: min(88vw, 420px);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(80, 69, 60, .92);
      color: white;
      font-size: 14px;
      text-align: center;
      transform: translate(-50%, 20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .screen {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding:
        max(24px, env(safe-area-inset-top))
        max(20px, env(safe-area-inset-right))
        max(30px, env(safe-area-inset-bottom))
        max(20px, env(safe-area-inset-left));
      overflow-y: auto;
      background: var(--bg);
      touch-action: none;
    }

    .screen.show {
      display: flex;
    }

    .menu {
      width: min(100%, 420px);
      text-align: center;
    }

    .menu-title {
      margin: 0 0 8px;
      font-size: clamp(76px, 23vw, 116px);
      line-height: .9;
      font-weight: 500;
      letter-spacing: -7px;
    }

    .menu-record {
      margin: 0 0 28px;
      font-size: 16px;
      opacity: .76;
    }

    .menu-buttons {
      display: grid;
      gap: 12px;
    }

    .menu-button {
      width: 100%;
      min-height: 62px;
      padding: 10px 18px;
      border-radius: 13px;
      background: var(--button);
      color: white;
      font-size: 22px;
      font-weight: 600;
      box-shadow: 0 2px 0 rgba(0,0,0,.08);
    }

    .menu-button.primary {
      background: var(--accent);
    }

    .menu-button:disabled {
      opacity: .42;
    }

    .menu-button small {
      display: block;
      margin-top: 4px;
      font-size: 13px;
      font-weight: 400;
      opacity: .86;
    }

    .load-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      text-align: left;
    }

    .back-button {
      flex: 0 0 auto;
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: var(--button);
      color: white;
      font-size: 26px;
    }

    .load-title {
      margin: 0;
      font-size: 30px;
    }

    .save-list {
      display: grid;
      gap: 10px;
    }

    .save-card {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--board);
      color: white;
      text-align: left;
    }

    .save-card strong {
      display: block;
      font-size: 22px;
    }

    .save-card span {
      display: block;
      margin-top: 5px;
      font-size: 14px;
      opacity: .88;
    }

    .empty-saves {
      padding: 24px 16px;
      border-radius: 12px;
      background: rgba(185,170,156,.25);
      font-size: 17px;
      line-height: 1.4;
    }

    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(247,244,234,.82);
      backdrop-filter: blur(3px);
    }

    .modal-layer.show {
      display: grid;
    }

    .modal-card {
      width: min(92vw, 390px);
      padding: 24px 20px 20px;
      border-radius: 17px;
      background: rgba(255,255,255,.97);
      text-align: center;
      box-shadow: 0 16px 45px rgba(70,55,40,.20);
    }

    .modal-card h2 {
      margin: 0 0 11px;
      font-size: 31px;
      line-height: 1.1;
    }

    .modal-card p {
      margin: 0 0 20px;
      font-size: 17px;
      line-height: 1.4;
    }

    .modal-actions {
      display: grid;
      gap: 9px;
    }

    .modal-button {
      min-height: 50px;
      padding: 8px 14px;
      border-radius: 11px;
      background: var(--button);
      color: white;
      font-size: 18px;
      font-weight: 600;
    }

    .modal-button.primary { background: var(--accent); }
    .modal-button.ghost {
      background: rgba(159,130,109,.16);
      color: var(--text);
    }

    @media (max-width: 410px) {
      :root { --gap: 8px; }

      .top {
        grid-template-columns: minmax(0, .88fr) minmax(0, 1.32fr);
        gap: 8px;
      }

      h1 {
        font-size: 58px;
        letter-spacing: -4px;
      }

      .stat {
        padding-inline: 5px;
      }

      .label { font-size: 11px; }
      .value { font-size: 23px; }

      .controls { margin-top: 10px; }

      .icon-button {
        width: 48px;
        height: 48px;
        font-size: 27px;
      }
    }
  
    .mode-line {
      display: flex;
      gap: 5px;
      align-items: center;
      margin-top: 2px;
      padding-left: 3px;
      font-size: 11px;
      opacity: .68;
      white-space: nowrap;
    }

    .icon-button { position: relative; }

    .undo-badge {
      position: absolute;
      top: -5px;
      right: -4px;
      min-width: 21px;
      height: 21px;
      padding: 0 5px;
      display: grid;
      place-items: center;
      border: 2px solid var(--bg);
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .mode-card,
    .stats-card {
      padding: 14px;
      border-radius: 13px;
      background: rgba(185,170,156,.30);
      text-align: left;
    }

    .mode-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .mode-card h3,
    .stats-card h3 {
      margin: 0;
      font-size: 21px;
    }

    .mode-rule {
      margin: 4px 0 0;
      font-size: 13px;
      line-height: 1.35;
      opacity: .75;
    }

    .mode-best {
      flex: 0 0 auto;
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(159,130,109,.17);
      font-size: 12px;
      text-align: right;
    }

    .mode-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .small-button {
      min-height: 43px;
      padding: 7px 10px;
      border-radius: 10px;
      background: var(--button);
      color: white;
      font-size: 15px;
      font-weight: 650;
    }

    .small-button.primary { background: var(--accent); }
    .small-button:disabled { opacity: .35; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 10px;
    }

    .stats-item {
      padding: 8px 9px;
      border-radius: 9px;
      background: rgba(255,255,255,.55);
      font-size: 12px;
    }

    .stats-item strong {
      display: block;
      margin-top: 3px;
      font-size: 17px;
    }

  </style>
</head>

<body>
  <main class="app" id="gameApp">
    <section class="top">
      <div class="brand">
        <h1>2048</h1>
        <button id="gameStateAction" class="game-state-action">Выйти в меню</button>
        <div class="mode-line">
          <span id="modeName">Лёгкий</span><span>·</span><span id="undoStatus">20 откатов</span>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="label">Очки</span>
          <span id="score" class="value">0</span>
        </div>
        <div class="stat">
          <span class="label">Рекорд</span>
          <span id="best" class="value">0</span>
        </div>
      </div>
    </section>

    <section class="controls">
      <button id="undo" class="icon-button" aria-label="Отменить ход" title="Отменить ход">
        ↶<span id="undoBadge" class="undo-badge">20</span>
      </button>
      <button id="restart" class="icon-button" aria-label="Новая игра" title="Новая игра">↻</button>
    </section>

    <section id="boardWrap" class="board-wrap" aria-label="Игровое поле">
      <div id="board" class="board">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      </div>
    </section>

    <p class="hint">Свайпай в любом свободном месте экрана. На компьютере работают стрелки и WASD.</p>
  </main>

  <section id="menuScreen" class="screen">
    <div id="mainMenu" class="menu">
      <h2 class="menu-title">2048</h2>
      <p id="menuRecord" class="menu-record">Лучший результат: 0</p>

      <div class="menu-buttons">
        <button id="continueButton" class="menu-button primary">
          Продолжить
          <small id="continueInfo"></small>
        </button>

        <button id="modesButton" class="menu-button">Выбрать режим</button>

        <button id="loadButton" class="menu-button">
          Загрузить
          <small id="loadInfo">Сохранения лёгкого режима</small>
        </button>

        <button id="statsButton" class="menu-button">Статистика</button>
      </div>
    </div>

    <div id="modesMenu" class="menu" hidden>
      <div class="load-header">
        <button class="back-button" data-back-main aria-label="Назад">‹</button>
        <h2 class="load-title">Режимы</h2>
      </div>
      <div id="modeList" class="save-list"></div>
    </div>

    <div id="loadMenu" class="menu" hidden>
      <div class="load-header">
        <button class="back-button" data-back-main aria-label="Назад">‹</button>
        <h2 class="load-title">Сохранённые игры</h2>
      </div>
      <div id="saveList" class="save-list"></div>
    </div>

    <div id="statsMenu" class="menu" hidden>
      <div class="load-header">
        <button class="back-button" data-back-main aria-label="Назад">‹</button>
        <h2 class="load-title">Статистика</h2>
      </div>
      <div id="statsList" class="save-list"></div>
    </div>
  </section>

  <section id="modalLayer" class="modal-layer" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
      <div id="modalActions" class="modal-actions"></div>
    </div>
  </section>

  <div id="toast" class="toast"></div>

  <script>

  (function () {
    "use strict";

    const N = 4;
    const ACTIVE_PREFIX = "mika2048-active-v5-";
    const STATS_KEY = "mika2048-stats-v5";
    const SAVES_KEY = "mika2048-checkpoints-v5-easy";
    const LAST_MODE_KEY = "mika2048-last-mode-v5";
    const MAX_CHECKPOINTS = 5;

    const MODES = {
      easy: { name: "Лёгкий", undos: 20, saves: true, rule: "20 откатов и контрольные сохранения" },
      medium: { name: "Средний", undos: 5, saves: false, rule: "5 откатов, только автосохранение" },
      hard: { name: "Сложный", undos: 1, saves: false, rule: "1 откат на всю партию" },
      hardcore: { name: "Хардкор", undos: 0, saves: false, rule: "Без откатов и контрольных сохранений" }
    };

    const $ = (id) => document.getElementById(id);
    const scoreEl = $("score");
    const bestEl = $("best");
    const cells = Array.from(document.querySelectorAll(".cell"));
    const board = $("board");
    const undoBtn = $("undo");
    const undoBadge = $("undoBadge");
    const restartBtn = $("restart");
    const gameStateAction = $("gameStateAction");
    const modeNameEl = $("modeName");
    const undoStatusEl = $("undoStatus");

    const menuScreen = $("menuScreen");
    const mainMenu = $("mainMenu");
    const modesMenu = $("modesMenu");
    const loadMenu = $("loadMenu");
    const statsMenu = $("statsMenu");
    const continueButton = $("continueButton");
    const continueInfo = $("continueInfo");
    const modesButton = $("modesButton");
    const loadButton = $("loadButton");
    const loadInfo = $("loadInfo");
    const statsButton = $("statsButton");
    const menuRecord = $("menuRecord");
    const modeList = $("modeList");
    const saveList = $("saveList");
    const statsList = $("statsList");

    const modalLayer = $("modalLayer");
    const modalTitle = $("modalTitle");
    const modalText = $("modalText");
    const modalActions = $("modalActions");
    const toast = $("toast");

    const colors = {
      0: ["#cec4b9", "transparent"],
      2: ["#eee6dc", "#776e65"],
      4: ["#ede0c8", "#776e65"],
      8: ["#f2b179", "#ffffff"],
      16: ["#f59563", "#ffffff"],
      32: ["#f67c5f", "#ffffff"],
      64: ["#f65e3b", "#ffffff"],
      128: ["#edcf72", "#ffffff"],
      256: ["#edcc61", "#ffffff"],
      512: ["#edc850", "#ffffff"],
      1024: ["#edc53f", "#ffffff"],
      2048: ["#edc22e", "#ffffff"],
      4096: ["#3f3b36", "#ffffff"],
      8192: ["#2d2925", "#ffffff"]
    };

    let mode = "easy";
    let grid = emptyGrid();
    let score = 0;
    let history = [];
    let undosLeft = MODES.easy.undos;
    let gameOver = false;
    let finishedCounted = false;
    let reached2048Counted = false;
    let hasActiveGame = false;
    let lastNewIndex = -1;
    let lastMergedIndices = [];
    let stats = loadStats();
    let toastTimer = null;

    function safeGet(key) {
      try { return localStorage.getItem(key); } catch (_) { return null; }
    }

    function safeSet(key, value) {
      try { localStorage.setItem(key, value); return true; } catch (_) { return false; }
    }

    function emptyGrid() {
      return Array.from({ length: N }, () => Array(N).fill(0));
    }

    function copyGrid(source) {
      return source.map((row) => row.slice());
    }

    function flatten(source) {
      return source.reduce((all, row) => all.concat(row), []);
    }

    function validGrid(candidate) {
      return Array.isArray(candidate) &&
        candidate.length === N &&
        candidate.every((row) =>
          Array.isArray(row) &&
          row.length === N &&
          row.every((value) => Number.isFinite(value) && value >= 0)
        );
    }

    function getMaxTile(source = grid) {
      return Math.max(...flatten(source));
    }

    function formatNumber(value) {
      try { return Number(value).toLocaleString("ru-RU"); }
      catch (_) { return String(value); }
    }

    function formatDate(timestamp) {
      try {
        return new Date(timestamp).toLocaleString("ru-RU", {
          day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit"
        });
      } catch (_) { return ""; }
    }

    function defaultModeStats() {
      return { bestScore: 0, maxTile: 0, gamesStarted: 0, gamesFinished: 0, reached2048: 0 };
    }

    function defaultStats() {
      return {
        easy: defaultModeStats(),
        medium: defaultModeStats(),
        hard: defaultModeStats(),
        hardcore: defaultModeStats()
      };
    }

    function loadStats() {
      const result = defaultStats();
      const raw = safeGet(STATS_KEY);

      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          Object.keys(MODES).forEach((modeId) => {
            if (!parsed || !parsed[modeId]) return;
            Object.keys(result[modeId]).forEach((key) => {
              const value = Number(parsed[modeId][key]);
              if (Number.isFinite(value) && value >= 0) result[modeId][key] = value;
            });
          });
        } catch (_) {}
      }

      result.easy.bestScore = Math.max(
        result.easy.bestScore,
        Number(safeGet("mika2048-best-v4")) || 0,
        Number(safeGet("mika2048-best")) || 0
      );
      return result;
    }

    function saveStats() {
      safeSet(STATS_KEY, JSON.stringify(stats));
    }

    function bestAcrossModes() {
      return Math.max(...Object.keys(MODES).map((modeId) => stats[modeId].bestScore));
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function activeKey(modeId) {
      return ACTIVE_PREFIX + modeId;
    }

    function normalizeState(candidate, fallbackMode = "easy") {
      if (!candidate || !validGrid(candidate.grid)) return null;
      const stateMode = MODES[candidate.mode] ? candidate.mode : fallbackMode;
      if (!MODES[stateMode]) return null;

      const safeHistory = Array.isArray(candidate.history)
        ? candidate.history
            .filter((item) => item && validGrid(item.grid) && Number.isFinite(item.score))
            .slice(-20)
            .map((item) => ({ grid: copyGrid(item.grid), score: Number(item.score) || 0 }))
        : [];

      const maxUndos = MODES[stateMode].undos;
      const rawUndos = Number(candidate.undosLeft);
      const normalizedUndos = Number.isFinite(rawUndos)
        ? Math.max(0, Math.min(maxUndos, rawUndos))
        : maxUndos;

      return {
        mode: stateMode,
        grid: copyGrid(candidate.grid),
        score: Number(candidate.score) || 0,
        history: safeHistory,
        undosLeft: normalizedUndos,
        gameOver: Boolean(candidate.gameOver),
        finishedCounted: Boolean(candidate.finishedCounted),
        reached2048Counted: Boolean(candidate.reached2048Counted),
        savedAt: Number(candidate.savedAt) || Date.now(),
        maxTile: Number(candidate.maxTile) || getMaxTile(candidate.grid)
      };
    }

    function snapshot() {
      return {
        version: 5,
        mode,
        grid: copyGrid(grid),
        score,
        history: history.slice(-20).map((item) => ({
          grid: copyGrid(item.grid),
          score: item.score
        })),
        undosLeft,
        gameOver,
        finishedCounted,
        reached2048Counted,
        savedAt: Date.now(),
        maxTile: getMaxTile()
      };
    }

    function updateCurrentStats() {
      const current = stats[mode];
      const maxTile = getMaxTile();

      current.bestScore = Math.max(current.bestScore, score);
      current.maxTile = Math.max(current.maxTile, maxTile);

      if (maxTile >= 2048 && !reached2048Counted) {
        current.reached2048 += 1;
        reached2048Counted = true;
      }
    }

    function saveActive() {
      if (!hasActiveGame) return;
      updateCurrentStats();
      safeSet(activeKey(mode), JSON.stringify(snapshot()));
      safeSet(LAST_MODE_KEY, mode);
      saveStats();
    }

    function loadModeState(modeId) {
      const raw = safeGet(activeKey(modeId));
      if (!raw) return null;
      try { return normalizeState(JSON.parse(raw), modeId); }
      catch (_) { return null; }
    }

    function applyState(state) {
      const normalized = normalizeState(state, state && state.mode ? state.mode : "easy");
      if (!normalized) return false;

      mode = normalized.mode;
      grid = copyGrid(normalized.grid);
      score = normalized.score;
      history = normalized.history;
      undosLeft = normalized.undosLeft;
      gameOver = normalized.gameOver || !canMove();
      finishedCounted = normalized.finishedCounted;
      reached2048Counted = normalized.reached2048Counted;
      hasActiveGame = true;
      lastNewIndex = -1;
      lastMergedIndices = [];
      safeSet(LAST_MODE_KEY, mode);
      return true;
    }

    function migrateOldVersion() {
      if (!safeGet(activeKey("easy"))) {
        const v4Raw = safeGet("mika2048-active-v4");

        if (v4Raw) {
          try {
            const old = JSON.parse(v4Raw);
            const migrated = normalizeState({
              mode: "easy",
              grid: old.grid,
              score: old.score,
              history: old.history || [],
              undosLeft: 20,
              gameOver: old.gameOver,
              savedAt: old.savedAt,
              maxTile: old.maxTile
            });

            if (migrated) safeSet(activeKey("easy"), JSON.stringify(migrated));
          } catch (_) {}
        } else {
          const oldGridRaw = safeGet("mika2048-grid");
          if (oldGridRaw) {
            try {
              const migrated = normalizeState({
                mode: "easy",
                grid: JSON.parse(oldGridRaw),
                score: Number(safeGet("mika2048-score")) || 0,
                history: [],
                undosLeft: 20,
                gameOver: false
              });

              if (migrated) safeSet(activeKey("easy"), JSON.stringify(migrated));
            } catch (_) {}
          }
        }
      }

      if (!safeGet(SAVES_KEY)) {
        const oldSavesRaw = safeGet("mika2048-checkpoints-v4");

        if (oldSavesRaw) {
          try {
            const migrated = JSON.parse(oldSavesRaw)
              .map((item) => normalizeState({
                mode: "easy",
                grid: item.grid,
                score: item.score,
                history: item.history || [],
                undosLeft: 20,
                gameOver: item.gameOver,
                savedAt: item.savedAt,
                maxTile: item.maxTile
              }))
              .filter(Boolean)
              .slice(0, 5);

            safeSet(SAVES_KEY, JSON.stringify(migrated));
          } catch (_) {}
        }
      }
    }

    function getCheckpoints() {
      const raw = safeGet(SAVES_KEY);
      if (!raw) return [];

      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed)
          ? parsed.map((item) => normalizeState(item, "easy")).filter(Boolean)
          : [];
      } catch (_) {
        return [];
      }
    }

    function setCheckpoints(items) {
      safeSet(SAVES_KEY, JSON.stringify(items.slice(0, 5)));
    }

    function createCheckpoint(silent = false) {
      if (!hasActiveGame || mode !== "easy") return;

      const current = snapshot();
      const signature = JSON.stringify(current.grid) + "|" + current.score + "|" + current.undosLeft;
      let saves = getCheckpoints().filter((item) =>
        JSON.stringify(item.grid) + "|" + item.score + "|" + item.undosLeft !== signature
      );

      saves.push(current);
      saves.sort((a, b) =>
        (b.maxTile - a.maxTile) || (b.score - a.score) || (b.savedAt - a.savedAt)
      );
      setCheckpoints(saves);

      if (!silent) showToast("Игра сохранена");
    }

    function getColor(value) {
      return colors[value] || ["#25221f", "#ffffff"];
    }

    function render() {
      flatten(grid).forEach((value, index) => {
        const cell = cells[index];
        const palette = getColor(value);

        cell.textContent = value === 0 ? "" : String(value);
        cell.style.backgroundColor = palette[0];
        cell.style.color = palette[1];
        cell.dataset.digits = value === 0 ? "0" : String(value).length;
        cell.classList.remove("new", "pop");
        void cell.offsetWidth;

        if (index === lastNewIndex) cell.classList.add("new");
        if (lastMergedIndices.includes(index)) cell.classList.add("pop");
      });

      const bestScore = stats[mode].bestScore;
      scoreEl.textContent = String(score);
      bestEl.textContent = String(bestScore);
      scoreEl.dataset.digits = String(score).length;
      bestEl.dataset.digits = String(bestScore).length;

      modeNameEl.textContent = MODES[mode].name;
      undoStatusEl.textContent = undosLeft === 1 ? "1 откат" : undosLeft + " откатов";
      undoBadge.textContent = String(undosLeft);
      undoBadge.hidden = MODES[mode].undos === 0;
      undoBtn.disabled = !hasActiveGame || !history.length || undosLeft === 0;

      if (gameOver) {
        gameStateAction.textContent = "Игра окончена";
        gameStateAction.classList.add("game-over");
      } else {
        gameStateAction.textContent = MODES[mode].saves
          ? "Сохранить и выйти в меню"
          : "Выйти в меню";
        gameStateAction.classList.remove("game-over");
      }

      lastNewIndex = -1;
      lastMergedIndices = [];
    }

    function emptyPositions() {
      const result = [];
      for (let row = 0; row < N; row++) {
        for (let col = 0; col < N; col++) {
          if (grid[row][col] === 0) result.push([row, col]);
        }
      }
      return result;
    }

    function addTile() {
      const positions = emptyPositions();
      if (!positions.length) return;

      const [row, col] = positions[Math.floor(Math.random() * positions.length)];
      grid[row][col] = Math.random() < .9 ? 2 : 4;
      lastNewIndex = row * N + col;
    }

    function startNewGame(modeId) {
      mode = modeId;
      grid = emptyGrid();
      score = 0;
      history = [];
      undosLeft = MODES[mode].undos;
      gameOver = false;
      finishedCounted = false;
      reached2048Counted = false;
      hasActiveGame = true;

      addTile();
      addTile();

      stats[mode].gamesStarted += 1;
      saveStats();
      saveActive();
      hideMenu();
      closeModal();
      render();
    }

    function sameGrid(a, b) {
      return a.every((row, r) => row.every((value, c) => value === b[r][c]));
    }

    function mergeLine(line) {
      const compact = line.filter((value) => value !== 0);
      const result = [];
      const mergedPositions = [];
      let gained = 0;

      for (let index = 0; index < compact.length; index++) {
        if (index + 1 < compact.length && compact[index] === compact[index + 1]) {
          const merged = compact[index] * 2;
          result.push(merged);
          mergedPositions.push(result.length - 1);
          gained += merged;
          index++;
        } else {
          result.push(compact[index]);
        }
      }

      while (result.length < N) result.push(0);
      return { line: result, gained, mergedPositions };
    }

    function move(direction) {
      if (!hasActiveGame || gameOver || menuScreen.classList.contains("show") || modalLayer.classList.contains("show")) return;

      const before = copyGrid(grid);
      const beforeScore = score;
      const next = emptyGrid();
      const mergedCells = [];
      let gained = 0;

      for (let fixed = 0; fixed < N; fixed++) {
        const line = [];

        for (let moving = 0; moving < N; moving++) {
          if (direction === "left") line.push(grid[fixed][moving]);
          if (direction === "right") line.push(grid[fixed][N - 1 - moving]);
          if (direction === "up") line.push(grid[moving][fixed]);
          if (direction === "down") line.push(grid[N - 1 - moving][fixed]);
        }

        const merged = mergeLine(line);
        gained += merged.gained;

        for (let moving = 0; moving < N; moving++) {
          let row;
          let col;

          if (direction === "left") { row = fixed; col = moving; }
          if (direction === "right") { row = fixed; col = N - 1 - moving; }
          if (direction === "up") { row = moving; col = fixed; }
          if (direction === "down") { row = N - 1 - moving; col = fixed; }

          next[row][col] = merged.line[moving];
          if (merged.mergedPositions.includes(moving)) mergedCells.push(row * N + col);
        }
      }

      if (sameGrid(before, next)) return;

      history.push({ grid: before, score: beforeScore });
      if (history.length > 20) history.shift();

      grid = next;
      score += gained;
      lastMergedIndices = mergedCells;
      addTile();

      board.classList.remove("move-left", "move-right", "move-up", "move-down");
      void board.offsetWidth;
      board.classList.add("move-" + direction);
      setTimeout(() => board.classList.remove("move-left", "move-right", "move-up", "move-down"), 170);

      gameOver = !canMove();
      updateCurrentStats();

      if (gameOver && !finishedCounted) {
        stats[mode].gamesFinished += 1;
        finishedCounted = true;
      }

      saveActive();
      render();

      if (navigator.vibrate && gained > 0) {
        try { navigator.vibrate(15); } catch (_) {}
      }
    }

    function canMove() {
      if (emptyPositions().length) return true;

      for (let row = 0; row < N; row++) {
        for (let col = 0; col < N; col++) {
          const value = grid[row][col];
          if (row + 1 < N && grid[row + 1][col] === value) return true;
          if (col + 1 < N && grid[row][col + 1] === value) return true;
        }
      }
      return false;
    }

    function undo() {
      if (!history.length || undosLeft <= 0) return;

      const previous = history.pop();
      grid = copyGrid(previous.grid);
      score = previous.score;
      undosLeft -= 1;
      gameOver = false;
      saveActive();
      render();
    }

    function showOnly(section) {
      [mainMenu, modesMenu, loadMenu, statsMenu].forEach((item) => {
        item.hidden = item !== section;
      });
    }

    function lastPlayableMode() {
      const saved = safeGet(LAST_MODE_KEY);
      if (saved && loadModeState(saved)) return saved;
      return Object.keys(MODES).find((modeId) => loadModeState(modeId)) || null;
    }

    function updateMainMenu() {
      const lastMode = lastPlayableMode();
      const state = lastMode ? loadModeState(lastMode) : null;
      const saves = getCheckpoints();

      menuRecord.textContent = "Лучший результат: " + formatNumber(bestAcrossModes());
      continueButton.disabled = !state;
      continueInfo.textContent = state
        ? MODES[lastMode].name + " · " + formatNumber(state.score) + " очков · плитка " + state.maxTile
        : "Нет текущей партии";

      loadButton.disabled = saves.length === 0;
      loadInfo.textContent = saves.length
        ? saves.length + " сохранён" + (saves.length === 1 ? "ная игра" : "ные игры")
        : "Сохранений лёгкого режима пока нет";
    }

    function showMenu() {
      saveActive();
      updateMainMenu();
      showOnly(mainMenu);
      menuScreen.classList.add("show");
    }

    function hideMenu() {
      menuScreen.classList.remove("show");
    }

    function continueMode(modeId) {
      const state = loadModeState(modeId);
      if (!state || !applyState(state)) return;
      hideMenu();
      render();
    }

    function renderModes() {
      modeList.innerHTML = "";

      Object.keys(MODES).forEach((modeId) => {
        const config = MODES[modeId];
        const active = loadModeState(modeId);
        const modeStats = stats[modeId];
        const card = document.createElement("div");
        card.className = "mode-card";

        card.innerHTML =
          '<div class="mode-card-head">' +
            '<div><h3>' + config.name + '</h3><p class="mode-rule">' + config.rule + '</p></div>' +
            '<div class="mode-best">Рекорд<br><strong>' + formatNumber(modeStats.bestScore) + '</strong></div>' +
          '</div>' +
          '<div class="mode-actions"></div>';

        const actions = card.querySelector(".mode-actions");
        const continueBtn = document.createElement("button");
        continueBtn.className = "small-button";
        continueBtn.textContent = active ? "Продолжить" : "Нет партии";
        continueBtn.disabled = !active;
        continueBtn.addEventListener("click", () => continueMode(modeId));

        const newBtn = document.createElement("button");
        newBtn.className = "small-button primary";
        newBtn.textContent = "Новая игра";
        newBtn.addEventListener("click", () => requestNewModeGame(modeId));

        actions.append(continueBtn, newBtn);
        modeList.appendChild(card);
      });
    }

    function renderSaves() {
      const saves = getCheckpoints();
      saveList.innerHTML = "";

      if (!saves.length) {
        saveList.innerHTML = '<div class="empty-saves">Сохранённых партий лёгкого режима пока нет.</div>';
        return;
      }

      saves.forEach((item) => {
        const button = document.createElement("button");
        button.className = "save-card";
        button.innerHTML =
          "<strong>" + item.maxTile + " · " + formatNumber(item.score) + " очков</strong>" +
          "<span>" + formatDate(item.savedAt) + " · откатов осталось: " + item.undosLeft + "</span>";

        button.addEventListener("click", () => {
          if (!applyState(item)) return;
          saveActive();
          hideMenu();
          render();
          showToast("Сохранение загружено");
        });

        saveList.appendChild(button);
      });
    }

    function renderStats() {
      statsList.innerHTML = "";

      Object.keys(MODES).forEach((modeId) => {
        const current = stats[modeId];
        const card = document.createElement("div");
        card.className = "stats-card";
        card.innerHTML =
          "<h3>" + MODES[modeId].name + "</h3>" +
          '<div class="stats-grid">' +
            '<div class="stats-item">Рекорд<strong>' + formatNumber(current.bestScore) + '</strong></div>' +
            '<div class="stats-item">Макс. плитка<strong>' + current.maxTile + '</strong></div>' +
            '<div class="stats-item">Начато партий<strong>' + current.gamesStarted + '</strong></div>' +
            '<div class="stats-item">Получено 2048<strong>' + current.reached2048 + '</strong></div>' +
          '</div>';
        statsList.appendChild(card);
      });
    }

    function openModal(title, text, buttons) {
      modalTitle.textContent = title;
      modalText.textContent = text;
      modalActions.innerHTML = "";

      buttons.forEach((config) => {
        const button = document.createElement("button");
        button.className = "modal-button " + (config.kind || "");
        button.textContent = config.label;
        button.addEventListener("click", config.action);
        modalActions.appendChild(button);
      });

      modalLayer.classList.add("show");
    }

    function closeModal() {
      modalLayer.classList.remove("show");
      modalActions.innerHTML = "";
    }

    function requestNewModeGame(modeId) {
      const oldState = loadModeState(modeId);

      if (!oldState) {
        startNewGame(modeId);
        return;
      }

      openModal(
        "Начать новую игру?",
        MODES[modeId].name + ". " + (
          modeId === "easy"
            ? "Текущая партия попадёт в список сохранений."
            : "Текущая партия этого режима будет заменена."
        ),
        [
          { label: "Отмена", kind: "ghost", action: closeModal },
          {
            label: "Начать",
            kind: "primary",
            action: () => {
              if (modeId === "easy") {
                const currentState = hasActiveGame ? snapshot() : null;
                applyState(oldState);
                createCheckpoint(true);
                if (currentState) applyState(currentState);
              }
              startNewGame(modeId);
            }
          }
        ]
      );
    }

    function requestRestart() {
      if (!hasActiveGame) return;

      const possibleUndos = Math.min(history.length, undosLeft);
      const reminder = possibleUndos > 0
        ? "Можно откатить ещё " + possibleUndos + " ход" + (possibleUndos === 1 ? "" : "ов") + " и попробовать продолжить 😊"
        : "Доступных откатов больше нет.";

      openModal(
        gameOver ? "Точно начать заново?" : "Начать новую игру?",
        reminder,
        [
          { label: "Отмена", kind: "ghost", action: closeModal },
          {
            label: "В меню",
            action: () => {
              if (mode === "easy") createCheckpoint(true);
              closeModal();
              showMenu();
            }
          },
          {
            label: "Начать заново",
            kind: "primary",
            action: () => {
              if (mode === "easy") createCheckpoint(true);
              startNewGame(mode);
            }
          }
        ]
      );
    }

    gameStateAction.addEventListener("click", () => {
      if (gameOver) {
        requestRestart();
        return;
      }

      if (mode === "easy") createCheckpoint(false);
      showMenu();
    });

    undoBtn.addEventListener("click", undo);
    restartBtn.addEventListener("click", requestRestart);

    continueButton.addEventListener("click", () => {
      const lastMode = lastPlayableMode();
      if (lastMode) continueMode(lastMode);
    });

    modesButton.addEventListener("click", () => {
      renderModes();
      showOnly(modesMenu);
    });

    loadButton.addEventListener("click", () => {
      renderSaves();
      showOnly(loadMenu);
    });

    statsButton.addEventListener("click", () => {
      renderStats();
      showOnly(statsMenu);
    });

    document.querySelectorAll("[data-back-main]").forEach((button) => {
      button.addEventListener("click", () => {
        updateMainMenu();
        showOnly(mainMenu);
      });
    });

    let startX = 0;
    let startY = 0;
    let tracking = false;

    function beginSwipe(x, y) {
      tracking = true;
      startX = x;
      startY = y;
    }

    function finishSwipe(x, y) {
      if (!tracking) return;
      tracking = false;

      const dx = x - startX;
      const dy = y - startY;
      if (Math.hypot(dx, dy) < 25) return;

      if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? "right" : "left");
      else move(dy > 0 ? "down" : "up");
    }

    function isInteractiveTarget(target) {
      return Boolean(target && target.closest && target.closest("button, a, input, select, textarea"));
    }

    document.addEventListener("touchstart", (event) => {
      if (!event.touches.length || isInteractiveTarget(event.target)) return;
      const touch = event.touches[0];
      beginSwipe(touch.clientX, touch.clientY);
    }, { passive: true });

    document.addEventListener("touchmove", (event) => event.preventDefault(), { passive: false });

    document.addEventListener("touchend", (event) => {
      if (!tracking || !event.changedTouches.length) return;
      const touch = event.changedTouches[0];
      finishSwipe(touch.clientX, touch.clientY);
    }, { passive: true });

    document.addEventListener("touchcancel", () => { tracking = false; }, { passive: true });
    document.addEventListener("gesturestart", (event) => event.preventDefault(), { passive: false });

    document.addEventListener("mousedown", (event) => {
      if (!isInteractiveTarget(event.target)) beginSwipe(event.clientX, event.clientY);
    });

    window.addEventListener("mouseup", (event) => finishSwipe(event.clientX, event.clientY));

    document.addEventListener("keydown", (event) => {
      const map = {
        ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down",
        a: "left", d: "right", w: "up", s: "down",
        A: "left", D: "right", W: "up", S: "down"
      };

      if (!map[event.key]) return;
      event.preventDefault();
      move(map[event.key]);
    }, { passive: false });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") saveActive();
    });
    window.addEventListener("pagehide", saveActive);
    window.addEventListener("beforeunload", saveActive);

    migrateOldVersion();

    const initialMode = lastPlayableMode();
    if (initialMode) {
      const initialState = loadModeState(initialMode);
      if (initialState) applyState(initialState);
    }

    render();
    showMenu();
  })();
  </script>

  <script>
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      let refreshing = false;

      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (refreshing) return;
        refreshing = true;
        location.reload();
      });

      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").then(function (registration) {
          registration.update();
        }).catch(function () {});
      });
    }
  </script>
</body>
