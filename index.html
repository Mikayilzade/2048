<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#f7f4ea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="2048">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <title>2048 — v10</title>

  <style>
    :root {
      --bg: #f7f4ea;
      --text: #776f66;
      --board: #b9aa9c;
      --empty: #cec4b9;
      --button: #9f826d;
      --accent: #f77d5c;
      --gap: 10px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background: var(--bg);
      color: var(--text);
    }

    body {
      position: fixed;
      inset: 0;
      height: 100dvh;
      padding:
        max(18px, env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(14px, env(safe-area-inset-left));
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      touch-action: none;
    }

    button {
      font: inherit;
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(94vw, 520px);
      height: 100%;
      margin: 0 auto;
      overflow: hidden;
      touch-action: none;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, .92fr) minmax(0, 1.28fr);
      gap: 10px;
      align-items: end;
      width: 100%;
    }

    .brand {
      min-width: 0;
    }

    h1 {
      margin: 0;
      min-width: 0;
      font-size: clamp(58px, 17vw, 94px);
      line-height: .86;
      font-weight: 500;
      letter-spacing: -5px;
      white-space: nowrap;
    }

    .game-state-action {
      display: block;
      width: 100%;
      margin: 10px 0 0;
      padding: 5px 3px;
      border-radius: 8px;
      background: transparent;
      color: var(--button);
      font-size: clamp(12px, 3.4vw, 15px);
      line-height: 1.15;
      text-align: left;
    }

    .game-state-action:active {
      background: rgba(159, 130, 109, .10);
    }

    .game-state-action.game-over {
      color: #b14d3e;
      font-weight: 700;
      font-size: clamp(14px, 4vw, 18px);
    }

    .stats {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      min-width: 0;
      width: 100%;
      padding: 8px 6px 10px;
      border-radius: 11px;
      background: var(--board);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .label {
      display: block;
      font-size: 13px;
      text-transform: uppercase;
    }

    .value {
      display: block;
      width: 100%;
      margin-top: 5px;
      font-size: clamp(20px, 6.1vw, 28px);
      line-height: 1;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .value[data-digits="6"] { font-size: clamp(18px, 5.3vw, 25px); }
    .value[data-digits="7"] { font-size: clamp(16px, 4.6vw, 22px); }
    .value[data-digits="8"] { font-size: clamp(14px, 4.0vw, 20px); }
    .value[data-digits="9"] { font-size: clamp(13px, 3.6vw, 18px); }

    .controls {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin: 12px 0 14px;
    }

    .icon-button {
      width: 52px;
      height: 52px;
      padding: 0;
      border-radius: 11px;
      background: var(--button);
      color: white;
      font-size: 30px;
      font-weight: 600;
      line-height: 1;
      box-shadow: 0 2px 0 rgba(0,0,0,.08);
    }

    .icon-button:active {
      transform: translateY(1px);
    }

    .icon-button:disabled {
      opacity: .42;
    }

    .board-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .board {
      width: 100%;
      height: 100%;
      padding: var(--gap);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: var(--gap);
      border-radius: 12px;
      background: var(--board);
    }

    .cell {
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      border-radius: 8px;
      background: var(--empty);
      font-weight: 500;
      font-size: clamp(30px, 10vw, 58px);
      line-height: 1;
      transition: background-color 100ms ease, transform 100ms ease;
      font-variant-numeric: tabular-nums;
    }

    .cell[data-digits="3"] { font-size: clamp(26px, 8.5vw, 50px); }
    .cell[data-digits="4"] { font-size: clamp(22px, 7vw, 42px); }
    .cell[data-digits="5"] { font-size: clamp(18px, 5.8vw, 34px); }

    .cell.pop { animation: pop .16s ease-out; }
    .cell.new { animation: appear .14s ease-out; }

    .board.move-left .cell:not(:empty) { animation: glide-left .14s cubic-bezier(.22,.72,.28,1); }
    .board.move-right .cell:not(:empty) { animation: glide-right .14s cubic-bezier(.22,.72,.28,1); }
    .board.move-up .cell:not(:empty) { animation: glide-up .14s cubic-bezier(.22,.72,.28,1); }
    .board.move-down .cell:not(:empty) { animation: glide-down .14s cubic-bezier(.22,.72,.28,1); }

    @keyframes glide-left { from { transform: translateX(11px); } to { transform: translateX(0); } }
    @keyframes glide-right { from { transform: translateX(-11px); } to { transform: translateX(0); } }
    @keyframes glide-up { from { transform: translateY(11px); } to { transform: translateY(0); } }
    @keyframes glide-down { from { transform: translateY(-11px); } to { transform: translateY(0); } }
    @keyframes pop { 50% { transform: scale(1.11); } }
    @keyframes appear {
      from { transform: scale(.35); opacity: .25; }
      to { transform: scale(1); opacity: 1; }
    }

    .hint {
      margin: 18px 8px 0;
      text-align: center;
      font-size: 16px;
      line-height: 1.35;
      opacity: .82;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(28px, env(safe-area-inset-bottom));
      z-index: 60;
      max-width: min(88vw, 420px);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(80, 69, 60, .92);
      color: white;
      font-size: 14px;
      text-align: center;
      transform: translate(-50%, 20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .screen {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior-y: contain;
      background: var(--bg);
      touch-action: pan-y;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: auto;
    }

    .screen.show {
      display: block;
    }

    .menu {
      width: min(calc(100% - 40px), 420px);
      margin: 0 auto;
      padding: max(24px, env(safe-area-inset-top)) 0 max(72px, calc(env(safe-area-inset-bottom) + 48px));
      text-align: center;
    }

    #mainMenu {
      padding-top: clamp(46px, 12vh, 112px);
    }

    .menu:not(#mainMenu) {
      padding-top: 0;
    }

    .menu-title {
      margin: 0 0 8px;
      font-size: clamp(76px, 23vw, 116px);
      line-height: .9;
      font-weight: 500;
      letter-spacing: -7px;
    }

    .menu-record {
      margin: 0 0 28px;
      font-size: 16px;
      opacity: .76;
    }

    .menu-buttons {
      display: grid;
      gap: 12px;
    }

    .menu-button {
      width: 100%;
      min-height: 62px;
      padding: 10px 18px;
      border-radius: 13px;
      background: var(--button);
      color: white;
      font-size: 22px;
      font-weight: 600;
      box-shadow: 0 2px 0 rgba(0,0,0,.08);
    }

    .menu-button.primary {
      background: var(--accent);
    }

    .menu-button:disabled {
      opacity: .42;
    }

    .menu-button small {
      display: block;
      margin-top: 4px;
      font-size: 13px;
      font-weight: 400;
      opacity: .86;
    }

    .load-header {
      position: sticky;
      top: 0;
      z-index: 8;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 -8px 18px;
      padding: max(16px, env(safe-area-inset-top)) 8px 12px;
      background: linear-gradient(to bottom, var(--bg) 78%, rgba(247,244,234,0));
      text-align: left;
    }

    .back-button {
      flex: 0 0 auto;
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: var(--button);
      color: white;
      font-size: 26px;
    }

    .load-title {
      margin: 0;
      font-size: 30px;
    }

    .save-list {
      display: grid;
      gap: 10px;
    }

    .save-card {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--board);
      color: white;
      text-align: left;
    }

    .save-card strong {
      display: block;
      font-size: 22px;
    }

    .save-card span {
      display: block;
      margin-top: 5px;
      font-size: 14px;
      opacity: .88;
    }

    .empty-saves {
      padding: 24px 16px;
      border-radius: 12px;
      background: rgba(185,170,156,.25);
      font-size: 17px;
      line-height: 1.4;
    }

    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(247,244,234,.82);
      backdrop-filter: blur(3px);
    }

    .modal-layer.show {
      display: grid;
    }

    .modal-card {
      width: min(92vw, 390px);
      padding: 24px 20px 20px;
      border-radius: 17px;
      background: rgba(255,255,255,.97);
      text-align: center;
      box-shadow: 0 16px 45px rgba(70,55,40,.20);
    }

    .modal-card h2 {
      margin: 0 0 11px;
      font-size: 31px;
      line-height: 1.1;
    }

    .modal-card p {
      margin: 0 0 20px;
      font-size: 17px;
      line-height: 1.4;
    }

    .modal-actions {
      display: grid;
      gap: 9px;
    }

    .modal-button {
      min-height: 50px;
      padding: 8px 14px;
      border-radius: 11px;
      background: var(--button);
      color: white;
      font-size: 18px;
      font-weight: 600;
    }

    .modal-button.primary { background: var(--accent); }
    .modal-button.ghost {
      background: rgba(159,130,109,.16);
      color: var(--text);
    }

    @media (max-width: 410px) {
      :root { --gap: 8px; }

      .top {
        grid-template-columns: minmax(0, .88fr) minmax(0, 1.32fr);
        gap: 8px;
      }

      h1 {
        font-size: 58px;
        letter-spacing: -4px;
      }

      .stat {
        padding-inline: 5px;
      }

      .label { font-size: 11px; }
      .value { font-size: 23px; }

      .controls { margin-top: 10px; }

      .icon-button {
        width: 48px;
        height: 48px;
        font-size: 27px;
      }
    }
  
    .mode-line {
      display: flex;
      gap: 5px;
      align-items: center;
      margin-top: 2px;
      padding-left: 3px;
      font-size: 11px;
      opacity: .68;
      white-space: nowrap;
    }

    .icon-button { position: relative; }

    .undo-badge {
      position: absolute;
      top: -5px;
      right: -4px;
      min-width: 21px;
      height: 21px;
      padding: 0 5px;
      display: grid;
      place-items: center;
      border: 2px solid var(--bg);
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .mode-card,
    .stats-card {
      padding: 14px;
      border-radius: 13px;
      background: rgba(185,170,156,.30);
      text-align: left;
    }

    .mode-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .mode-card h3,
    .stats-card h3 {
      margin: 0;
      font-size: 21px;
    }

    .mode-rule {
      margin: 4px 0 0;
      font-size: 13px;
      line-height: 1.35;
      opacity: .75;
    }

    .mode-best {
      flex: 0 0 auto;
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(159,130,109,.17);
      font-size: 12px;
      text-align: right;
    }

    .mode-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .small-button {
      min-height: 43px;
      padding: 7px 10px;
      border-radius: 10px;
      background: var(--button);
      color: white;
      font-size: 15px;
      font-weight: 650;
    }

    .small-button.primary { background: var(--accent); }
    .small-button:disabled { opacity: .35; }


    .checkpoint-action {
      margin-top: 0;
      padding-top: 2px;
      padding-bottom: 3px;
      font-size: clamp(11px, 3.1vw, 14px);
      opacity: .82;
    }

    .checkpoint-action[hidden] {
      display: none;
    }

    .checkpoint-panel {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(119,111,102,.16);
    }

    .checkpoint-toggle {
      width: 100%;
      min-height: 42px;
      padding: 8px 11px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-radius: 10px;
      background: rgba(159,130,109,.16);
      color: var(--text);
      font-size: 14px;
      font-weight: 650;
      text-align: left;
    }

    .checkpoint-toggle span:last-child {
      flex: 0 0 auto;
      opacity: .72;
    }

    .checkpoint-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .checkpoint-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 44px;
      gap: 7px;
    }

    .checkpoint-load {
      min-width: 0;
      padding: 10px 11px;
      border-radius: 10px;
      background: var(--board);
      color: white;
      text-align: left;
    }

    .checkpoint-load strong {
      display: block;
      overflow: hidden;
      font-size: 16px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .checkpoint-load span {
      display: block;
      margin-top: 4px;
      overflow: hidden;
      font-size: 11px;
      opacity: .86;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .checkpoint-delete {
      width: 44px;
      min-height: 52px;
      border-radius: 10px;
      background: rgba(177,77,62,.13);
      color: #a34b3f;
      font-size: 20px;
      font-weight: 700;
    }

    .checkpoint-empty {
      padding: 12px;
      border-radius: 10px;
      background: rgba(255,255,255,.46);
      font-size: 12px;
      line-height: 1.4;
      text-align: center;
      opacity: .78;
    }



    .achievement-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-bottom: 12px;
    }

    .summary-item {
      padding: 10px 6px;
      border-radius: 11px;
      background: rgba(185,170,156,.30);
      font-size: 11px;
      line-height: 1.25;
      text-align: center;
    }

    .summary-item strong {
      display: block;
      margin-bottom: 3px;
      font-size: 20px;
    }

    .period-card,
    .achievement-section {
      padding: 14px;
      border-radius: 13px;
      background: rgba(185,170,156,.30);
      text-align: left;
    }

    .period-card + .period-card,
    .period-card + .achievement-section,
    .achievement-section + .achievement-section {
      margin-top: 10px;
    }

    .period-head,
    .achievement-section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .period-head h3,
    .achievement-section-head h3 {
      margin: 0;
      font-size: 21px;
    }

    .period-head span,
    .achievement-section-head span {
      flex: 0 0 auto;
      font-size: 12px;
      opacity: .70;
    }

    .goal-list,
    .achievement-list {
      display: grid;
      gap: 8px;
    }

    .goal-card,
    .achievement-card {
      padding: 10px;
      border-radius: 10px;
      background: rgba(255,255,255,.55);
    }

    .goal-card.done,
    .achievement-card.done {
      background: rgba(237,207,114,.36);
    }

    .goal-top,
    .achievement-top {
      display: flex;
      align-items: flex-start;
      gap: 9px;
    }

    .goal-icon,
    .achievement-icon {
      flex: 0 0 auto;
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: rgba(159,130,109,.15);
      font-size: 17px;
    }

    .goal-content,
    .achievement-content {
      min-width: 0;
      flex: 1;
    }

    .goal-title,
    .achievement-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    .goal-title span:last-child,
    .achievement-title span:last-child {
      flex: 0 0 auto;
      font-size: 11px;
      font-weight: 600;
      opacity: .72;
    }

    .goal-description,
    .achievement-description {
      margin-top: 3px;
      font-size: 11px;
      line-height: 1.35;
      opacity: .74;
    }

    .progress-track {
      height: 6px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(119,111,102,.15);
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width .25s ease;
    }

    .goal-card.done .progress-fill,
    .achievement-card.done .progress-fill {
      background: #d8b84b;
    }

    .period-history {
      margin-top: 10px;
      padding: 9px 10px;
      border-radius: 9px;
      background: rgba(255,255,255,.42);
      font-size: 11px;
      line-height: 1.4;
      text-align: center;
      opacity: .78;
    }

    .overall-stats-card {
      margin-bottom: 10px;
      background: rgba(159,130,109,.18);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 10px;
    }

    .stats-item {
      padding: 8px 9px;
      border-radius: 9px;
      background: rgba(255,255,255,.55);
      font-size: 12px;
    }

    .stats-item strong {
      display: block;
      margin-top: 3px;
      font-size: 17px;
    }


    body.animations-off *,
    body.animations-off *::before,
    body.animations-off *::after {
      animation: none !important;
      transition: none !important;
    }

    body.animations-minimal .board.move-left .cell,
    body.animations-minimal .board.move-right .cell,
    body.animations-minimal .board.move-up .cell,
    body.animations-minimal .board.move-down .cell {
      animation: none !important;
    }

    body.animations-minimal .cell.new {
      animation-duration: .10s;
    }

    body.animations-minimal .cell.pop {
      animation-duration: .11s;
    }

    .setting-row.setting-disabled {
      opacity: .52;
    }

    .switch input:disabled + span {
      background: rgba(119,111,102,.16);
    }

    .choice-row {
      display: block;
      padding: 10px 2px 12px;
      border-bottom: 1px solid rgba(119,111,102,.10);
      text-align: left;
    }

    .choice-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 9px;
    }

    .choice-button {
      min-height: 39px;
      padding: 6px 7px;
      border-radius: 9px;
      background: rgba(159,130,109,.14);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }

    .choice-button.active {
      background: var(--button);
      color: white;
    }

    .settings-action-list {
      display: grid;
      gap: 8px;
    }

    .settings-action {
      width: 100%;
      min-height: 48px;
      padding: 9px 12px;
      border-radius: 10px;
      background: var(--button);
      color: white;
      font-size: 15px;
      font-weight: 700;
    }

    .settings-action.secondary {
      background: rgba(159,130,109,.17);
      color: var(--text);
    }

    .version-info {
      display: grid;
      gap: 7px;
      font-size: 12px;
      line-height: 1.4;
    }

    .version-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 2px;
      border-bottom: 1px solid rgba(119,111,102,.10);
    }

    .version-line strong {
      flex: 0 0 auto;
    }

    .update-status {
      min-height: 18px;
      margin-top: 7px;
      font-size: 12px;
      line-height: 1.4;

    ];

    const settingsContent = $("settingsContent");

      2048: ["#edc22e", "#ffffff"],
      4096: ["#3f3b36", "#ffffff"],

    };

    function rawGet(key) {
      try { return localStorage.getItem(key); } catch (_) { return null; }
    }

    function rawSet(key, value) {
      try { localStorage.setItem(key, value); return true; } catch (_) { return false; }
    }

    function rawRemove(key) {
      try { localStorage.removeItem(key); } catch (_) {}
    }

    function defaultSettings() {
      return {
        achievementNotifications: true,
        goalNotifications: true,
        vibration: true,
        animationLevel: "minimal",
        confirmNewGame: true,
        language: "ru"
      };
    }

    function loadSettings() {
      const result = defaultSettings();
      const raw = rawGet(SETTINGS_KEY);
      if (!raw) return result;

      try {
        const parsed = JSON.parse(raw) || {};
        Object.assign(result, parsed);

        if (!["off", "minimal", "full"].includes(result.animationLevel)) {
          if (parsed.animations === false) result.animationLevel = "off";
          else if (parsed.animations === true) result.animationLevel = "full";
          else result.animationLevel = "minimal";
        }

        return result;
      } catch (_) {
        return result;
      }
    }

    function saveSettings() {
      rawSet(SETTINGS_KEY, JSON.stringify(settings));
    }

    function createProfileId() {
      return "p" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function loadProfiles() {
      let items = [];
      try {
        const parsed = JSON.parse(rawGet(PROFILES_KEY) || "[]");
        if (Array.isArray(parsed)) items = parsed.filter((item) => item && item.id && item.name);
      } catch (_) {}

      if (!items.length) {
        items = [{ id: "mikayil", name: "Mikayil", createdAt: Date.now() }];
        rawSet(PROFILES_KEY, JSON.stringify(items));
      }
      return items;
    }

    let settings = loadSettings();
    const vibrationSupported = typeof navigator.vibrate === "function";
    let profiles = loadProfiles();
    let currentProfileId = rawGet(CURRENT_PROFILE_KEY);
    if (!profiles.some((item) => item.id === currentProfileId)) {
      currentProfileId = profiles[0].id;
      rawSet(CURRENT_PROFILE_KEY, currentProfileId);
    }

    function currentProfile() {
      return profiles.find((item) => item.id === currentProfileId) || profiles[0];
    }

    function profileStorageKey(key, profileId = currentProfileId) {
      return "mika2048-profile-v9:" + profileId + ":" + key;
    }

    function isProfileKey(key) {
      return key === STATS_KEY ||
        key === SAVES_KEY ||
        key === LAST_MODE_KEY ||
        key === ACHIEVEMENTS_KEY ||
        key === PERIODS_KEY ||
        key === USAGE_KEY ||
        key.startsWith(ACTIVE_PREFIX);
    }

    function safeGet(key) {
      return rawGet(isProfileKey(key) ? profileStorageKey(key) : key);
    }

    function safeSet(key, value) {
      return rawSet(isProfileKey(key) ? profileStorageKey(key) : key, value);
    }

    function migrateExistingDataToFirstProfile() {
      if (rawGet(PROFILE_MIGRATION_KEY)) return;
      const targetId = profiles[0].id;
      const keys = [STATS_KEY, SAVES_KEY, LAST_MODE_KEY, ACHIEVEMENTS_KEY, PERIODS_KEY];
      Object.keys(MODES).forEach((modeId) => keys.push(ACTIVE_PREFIX + modeId));

      keys.forEach((key) => {
        const oldValue = rawGet(key);
        const destination = profileStorageKey(key, targetId);
        if (oldValue !== null && rawGet(destination) === null) rawSet(destination, oldValue);
      });
      rawSet(PROFILE_MIGRATION_KEY, "1");
    }

    migrateExistingDataToFirstProfile();

    function defaultUsage() {
      return { activeTimeMs: 0, totalSwipes: 0 };
    }

    function loadUsage() {
      const result = defaultUsage();
      const raw = safeGet(USAGE_KEY);
      if (!raw) return result;
      try {
        const parsed = JSON.parse(raw) || {};
        result.activeTimeMs = Math.max(0, Number(parsed.activeTimeMs) || 0);
        result.totalSwipes = Math.max(0, Number(parsed.totalSwipes) || 0);
      } catch (_) {}
      return result;
    }

    function emptyGrid() {
      return Array.from({ length: N }, () => Array(N).fill(0));
    }

    function copyGrid(source) {
      return source.map((row) => row.slice());
    }

    function flatten(source) {
      return source.reduce((all, row) => all.concat(row), []);
    }

    function validGrid(candidate) {
      return Array.isArray(candidate) &&
        candidate.length === N &&
        candidate.every((row) =>
          Array.isArray(row) &&
          row.length === N &&
          row.every((value) => Number.isFinite(value) && value >= 0)
        );
    }

    function getMaxTile(source = grid) {
      return Math.max(...flatten(source));
    }

    function formatNumber(value) {
      try { return Number(value).toLocaleString("ru-RU"); }
      catch (_) { return String(value); }
    }

    function formatDate(timestamp) {
      try {
        return new Date(timestamp).toLocaleString("ru-RU", {
          day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit"
        });
      } catch (_) { return ""; }
    }

    function formatDuration(milliseconds) {
      const totalMinutes = Math.floor(Math.max(0, milliseconds) / 60000);
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      if (hours > 0) return hours + " ч. " + minutes + " мин.";
      return minutes + " мин.";
    }

    function markActivity() {
      lastActivityAt = Date.now();
    }

    function flushActiveTime() {
      const now = Date.now();
      if (document.visibilityState === "visible" && now - lastActivityAt <= 60000) {
        usage.activeTimeMs += Math.max(0, now - activeClockAt);
      }
      activeClockAt = now;
    }

        gamesStarted: 0,
        gamesFinished: 0,
        reached2048: 0,
        reached2048NoUndo: 0,
        totalMoves: 0,
        totalScore: 0,
        totalMerges: 0,
        totalUndos: 0,
        noUndoFinishes: 0,
        bestNoUndoScore: 0
      };
    }

    function defaultStats() {
      return {
        easy: defaultModeStats(),
        medium: defaultModeStats(),
        hard: defaultModeStats(),
        hardcore: defaultModeStats()
      };
    }

    function loadStats() {
      const result = defaultStats();
      const raw = safeGet(STATS_KEY);

      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          Object.keys(MODES).forEach((modeId) => {
            if (!parsed || !parsed[modeId]) return;
            Object.keys(result[modeId]).forEach((key) => {
              const value = Number(parsed[modeId][key]);
              if (Number.isFinite(value) && value >= 0) result[modeId][key] = value;
            });
          });
        } catch (_) {}
      }

      if (currentProfileId === profiles[0].id) {
        result.easy.bestScore = Math.max(
          result.easy.bestScore,
          Number(safeGet("mika2048-best-v4")) || 0,
          Number(safeGet("mika2048-best")) || 0
        );
      }
      return result;
    }

    function saveStats() {
      safeSet(STATS_KEY, JSON.stringify(stats));
    }

    function bestAcrossModes() {
      return Math.max(...Object.keys(MODES).map((modeId) => stats[modeId].bestScore));
    }

    function showToast(message, duration = 1600) {
      toastQueue.push({ message, duration });
      showNextToast();
    }

    function showNextToast() {
      if (toastActive || !toastQueue.length) return;
      toastActive = true;
      const item = toastQueue.shift();
      toast.textContent = item.message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => {
          toastActive = false;
          showNextToast();
        }, 190);
      }, item.duration);
    }

    function overallStats() {
      const result = {
        bestScore: 0,
        maxTile: 0,
        gamesStarted: 0,
        gamesFinished: 0,
        reached2048: 0,
        clean2048: 0,
        totalMoves: 0,
        totalScore: 0,
        totalMerges: 0,
        totalUndos: 0,
        noUndoFinishes: 0,
        modesPlayed: 0
      };

      Object.keys(MODES).forEach((modeId) => {
        const item = stats[modeId];
        result.bestScore = Math.max(result.bestScore, item.bestScore);
        result.maxTile = Math.max(result.maxTile, item.maxTile);
        result.gamesStarted += item.gamesStarted;
        result.gamesFinished += item.gamesFinished;
        result.reached2048 += item.reached2048;
        result.clean2048 += item.reached2048NoUndo;
        result.totalMoves += item.totalMoves;
        result.totalScore += item.totalScore;
        result.totalMerges += item.totalMerges;
        result.totalUndos += item.totalUndos;
        result.noUndoFinishes += item.noUndoFinishes;
        if (item.gamesStarted > 0) result.modesPlayed += 1;
      });

      return result;
    }

    function loadAchievementData() {
      const raw = safeGet(ACHIEVEMENTS_KEY);
      if (!raw) return { unlocked: {} };

      try {
        const parsed = JSON.parse(raw);
        return {
          unlocked: parsed && parsed.unlocked && typeof parsed.unlocked === "object"
            ? parsed.unlocked
            : {}
        };
      } catch (_) {
        return { unlocked: {} };
      }
    }

    function saveAchievementData() {
      safeSet(ACHIEVEMENTS_KEY, JSON.stringify(achievementData));
    }

    function checkAllTimeAchievements(silent = false) {
      let changed = false;

      ALL_TIME_ACHIEVEMENTS.forEach((achievement) => {
        if (achievementData.unlocked[achievement.id]) return;
        if (achievement.value() < achievement.target) return;

        achievementData.unlocked[achievement.id] = Date.now();
        changed = true;
        if (!silent && settings.achievementNotifications) {
          showToast("🏆 Достижение: " + achievement.title, 2200);
        }
      });

      if (changed) saveAchievementData();
    }

    function defaultPeriodProgress() {
      return { moves: 0, score: 0, merges: 0, games: 0, maxTile: 0 };
    }

    function defaultPeriodData() {
      return {
        week: { id: "", progress: defaultPeriodProgress(), completed: [], perfectNotified: false },
        month: { id: "", progress: defaultPeriodProgress(), completed: [], perfectNotified: false },
        history: { weeks: [], months: [] }
      };
    }

    function loadPeriodData() {
      const result = defaultPeriodData();
      const raw = safeGet(PERIODS_KEY);
      if (!raw) return result;

      try {
        const parsed = JSON.parse(raw);
        ["week", "month"].forEach((type) => {
          if (!parsed || !parsed[type]) return;
          result[type].id = String(parsed[type].id || "");
          result[type].progress = Object.assign(defaultPeriodProgress(), parsed[type].progress || {});
          result[type].completed = Array.isArray(parsed[type].completed) ? parsed[type].completed.slice() : [];
          result[type].perfectNotified = Boolean(parsed[type].perfectNotified);
        });

        if (parsed && parsed.history) {
          result.history.weeks = Array.isArray(parsed.history.weeks) ? parsed.history.weeks.slice(0, 12) : [];
          result.history.months = Array.isArray(parsed.history.months) ? parsed.history.months.slice(0, 12) : [];
        }
      } catch (_) {}

      return result;
    }

    function savePeriodData() {
      safeSet(PERIODS_KEY, JSON.stringify(periodData));
    }

    function weekId(date = new Date()) {
      const local = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const day = local.getUTCDay() || 7;
      local.setUTCDate(local.getUTCDate() + 4 - day);
      const yearStart = new Date(Date.UTC(local.getUTCFullYear(), 0, 1));
      const week = Math.ceil((((local - yearStart) / 86400000) + 1) / 7);
      return local.getUTCFullYear() + "-W" + String(week).padStart(2, "0");
    }

    function monthId(date = new Date()) {
      return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
    }

    function completedGoalIds(progress, definitions) {
      return definitions
        .filter((goal) => Number(progress[goal.metric]) >= goal.target)
        .map((goal) => goal.id);
    }

    function rollPeriod(type, newId, definitions, historyKey) {
      const current = periodData[type];
      if (!current.id) {
        current.id = newId;
        return;
      }

      if (current.id === newId) return;
      const completed = completedGoalIds(current.progress, definitions);
      periodData.history[historyKey].unshift({
        id: current.id,
        completed: completed.length,
        total: definitions.length,
        perfect: completed.length === definitions.length,
        endedAt: Date.now()
      });
      periodData.history[historyKey] = periodData.history[historyKey].slice(0, 12);
      periodData[type] = {
        id: newId,
        progress: defaultPeriodProgress(),
        completed: [],
        perfectNotified: false
      };
    }

    function ensurePeriods() {
      rollPeriod("week", weekId(), WEEKLY_GOALS, "weeks");
      rollPeriod("month", monthId(), MONTHLY_GOALS, "months");
      savePeriodData();
    }

    function evaluatePeriod(type, definitions, label) {
      const current = periodData[type];
      const completedNow = completedGoalIds(current.progress, definitions);

      definitions.forEach((goal) => {
        if (!completedNow.includes(goal.id) || current.completed.includes(goal.id)) return;
        current.completed.push(goal.id);
        if (settings.goalNotifications) showToast("✅ " + label + ": " + goal.title, 2100);
      });

      if (completedNow.length === definitions.length && !current.perfectNotified) {
        current.perfectNotified = true;
        if (settings.goalNotifications) showToast("🏆 Все " + label.toLowerCase() + " цели выполнены!", 2300);
      }
    }

    function updatePeriodProgress(delta = {}) {
      ensurePeriods();

      ["week", "month"].forEach((type) => {
        const progress = periodData[type].progress;
        progress.moves += Number(delta.moves) || 0;
        progress.score += Number(delta.score) || 0;
        progress.merges += Number(delta.merges) || 0;
        progress.games += Number(delta.games) || 0;
        progress.maxTile = Math.max(progress.maxTile, Number(delta.maxTile) || 0);
      });

      evaluatePeriod("week", WEEKLY_GOALS, "Недельная цель");
      evaluatePeriod("month", MONTHLY_GOALS, "Месячная цель");
      savePeriodData();
    }

    function periodRemaining(type) {
      const now = new Date();
      let end;

      if (type === "week") {
        const day = now.getDay() || 7;
        end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + (8 - day));
      } else {
        end = new Date(now.getFullYear(), now.getMonth() + 1, 1);
      }

      const hoursTotal = Math.max(0, Math.ceil((end - now) / 3600000));
      const days = Math.floor(hoursTotal / 24);
      const hours = hoursTotal % 24;
      return days > 0 ? days + " дн. " + hours + " ч." : hours + " ч.";
    }

    function activeKey(modeId) {
      return ACTIVE_PREFIX + modeId;
    }

    function normalizeState(candidate, fallbackMode = "easy") {
      if (!candidate || !validGrid(candidate.grid)) return null;
      const stateMode = MODES[candidate.mode] ? candidate.mode : fallbackMode;
      if (!MODES[stateMode]) return null;

      const historyLimit = MODES[stateMode].historyLimit;
      const safeHistory = Array.isArray(candidate.history)
        ? candidate.history
            .filter((item) => item && validGrid(item.grid) && Number.isFinite(item.score))
            .slice(-historyLimit || undefined)
            .map((item) => ({ grid: copyGrid(item.grid), score: Number(item.score) || 0 }))
        : [];

      if (historyLimit === 0) safeHistory.length = 0;

      return {
        mode: stateMode,
        grid: copyGrid(candidate.grid),
        score: Number(candidate.score) || 0,
        history: safeHistory,
        gameOver: Boolean(candidate.gameOver),
        finishedCounted: Boolean(candidate.finishedCounted),
        reached2048Counted: Boolean(candidate.reached2048Counted),
        movesCount: Number(candidate.movesCount) || 0,
        undosUsed: Number(candidate.undosUsed) || 0,
        mergesCount: Number(candidate.mergesCount) || 0,
        savedAt: Number(candidate.savedAt) || Date.now(),
        maxTile: Number(candidate.maxTile) || getMaxTile(candidate.grid)
      };
    }

    function snapshot() {
      return {
        version: 9,
        mode,
        grid: copyGrid(grid),
        score,
        history: history.slice(-20).map((item) => ({
          grid: copyGrid(item.grid),
          score: item.score
        })),
        gameOver,
        finishedCounted,
        reached2048Counted,
        movesCount,
        undosUsed,
        mergesCount,
        savedAt: Date.now(),
        maxTile: getMaxTile()
      };
    }

    function updateCurrentStats() {
      const current = stats[mode];
      const maxTile = getMaxTile();

      current.bestScore = Math.max(current.bestScore, score);
      current.maxTile = Math.max(current.maxTile, maxTile);

      if (maxTile >= 2048 && !reached2048Counted) {
        current.reached2048 += 1;
        if (undosUsed === 0) current.reached2048NoUndo += 1;
        reached2048Counted = true;
      }
    }

    function saveActive() {
      if (!hasActiveGame) return;
      updateCurrentStats();
      safeSet(activeKey(mode), JSON.stringify(snapshot()));
      safeSet(LAST_MODE_KEY, mode);
      saveStats();
    }

    function loadModeState(modeId) {
      const raw = safeGet(activeKey(modeId));
      if (!raw) return null;
      try { return normalizeState(JSON.parse(raw), modeId); }
      catch (_) { return null; }
    }

    function applyState(state) {
      const normalized = normalizeState(state, state && state.mode ? state.mode : "easy");
      if (!normalized) return false;

      mode = normalized.mode;
      grid = copyGrid(normalized.grid);
      score = normalized.score;
      history = normalized.history;
      gameOver = normalized.gameOver || !canMove();
      finishedCounted = normalized.finishedCounted;
      reached2048Counted = normalized.reached2048Counted;
      movesCount = normalized.movesCount;
      undosUsed = normalized.undosUsed;
      mergesCount = normalized.mergesCount;
      hasActiveGame = true;
      lastNewIndex = -1;
      lastMergedIndices = [];
      safeSet(LAST_MODE_KEY, mode);
      return true;
    }

    function migrateOldVersion() {
      if (currentProfileId !== profiles[0].id) return;

      if (!safeGet(activeKey("easy"))) {
        const v4Raw = safeGet("mika2048-active-v4");

        if (v4Raw) {
          try {
            const old = JSON.parse(v4Raw);
            const migrated = normalizeState({
              mode: "easy",
              grid: old.grid,
              score: old.score,
              history: old.history || [],
              gameOver: old.gameOver,
              savedAt: old.savedAt,
              maxTile: old.maxTile
            });

            if (migrated) safeSet(activeKey("easy"), JSON.stringify(migrated));
          } catch (_) {}
        } else {
          const oldGridRaw = safeGet("mika2048-grid");
          if (oldGridRaw) {
            try {
              const migrated = normalizeState({
                mode: "easy",
                grid: JSON.parse(oldGridRaw),
                score: Number(safeGet("mika2048-score")) || 0,
                history: [],
                gameOver: false
              });

              if (migrated) safeSet(activeKey("easy"), JSON.stringify(migrated));
            } catch (_) {}
          }
        }
      }

      if (!safeGet(SAVES_KEY)) {
        const oldSavesRaw = safeGet("mika2048-checkpoints-v4");

        if (oldSavesRaw) {
          try {
            const migrated = JSON.parse(oldSavesRaw)
              .map((item) => normalizeState({
                mode: "easy",
                grid: item.grid,
                score: item.score,
                history: item.history || [],
                gameOver: item.gameOver,
                savedAt: item.savedAt,
                maxTile: item.maxTile
              }))
              .filter(Boolean)
              .slice(0, MAX_CHECKPOINTS);

            safeSet(SAVES_KEY, JSON.stringify(migrated));
          } catch (_) {}
        }
      }
    }

    function getCheckpoints() {
      const raw = safeGet(SAVES_KEY);
      if (!raw) return [];

      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed)
          ? parsed.map((item) => normalizeState(item, "easy")).filter(Boolean)
          : [];
      } catch (_) {
        return [];
      }
    }

    function setCheckpoints(items) {
      safeSet(SAVES_KEY, JSON.stringify(items.slice(0, MAX_CHECKPOINTS)));
    }

    function checkpointSignature(item) {
      return JSON.stringify(item.grid) + "|" + item.score;
    }

    function addCheckpoint(state, silent = false) {
      const current = normalizeState(state, "easy");
      if (!current || current.mode !== "easy") return "invalid";

      current.savedAt = Date.now();
      current.maxTile = getMaxTile(current.grid);

      const saves = getCheckpoints();
      const signature = checkpointSignature(current);

      if (saves.some((item) => checkpointSignature(item) === signature)) {
        if (!silent) showToast("Такая контрольная точка уже сохранена");
        return "exists";
      }

      if (saves.length >= MAX_CHECKPOINTS) {
        if (!silent) showToast("Максимум 3 точки. Удали ненужную в меню режимов");
        return "full";
      }

      saves.unshift(current);
      setCheckpoints(saves);
      checkAllTimeAchievements();

      if (!silent) showToast("Контрольная точка создана");
      return "created";
    }

    function createCheckpoint(silent = false) {
      if (!hasActiveGame || mode !== "easy") return "invalid";
      return addCheckpoint(snapshot(), silent);
    }

    function trimLegacyCheckpoints() {
      const unique = [];
      const signatures = new Set();

      getCheckpoints()
        .sort((a, b) =>
          (b.maxTile - a.maxTile) ||
          (b.score - a.score) ||
          (b.savedAt - a.savedAt)
        )
        .forEach((item) => {
          const signature = checkpointSignature(item);
          if (signatures.has(signature)) return;
          signatures.add(signature);
          unique.push(item);
        });

      setCheckpoints(unique.slice(0, MAX_CHECKPOINTS));
    }

    function getColor(value) {
      return colors[value] || ["#25221f", "#ffffff"];
    }

    function render() {
      flatten(grid).forEach((value, index) => {
        const cell = cells[index];
        const palette = getColor(value);

        cell.textContent = value === 0 ? "" : String(value);
        cell.style.backgroundColor = palette[0];
        cell.style.color = palette[1];
        cell.dataset.digits = value === 0 ? "0" : String(value).length;
        cell.classList.remove("new", "pop");
        void cell.offsetWidth;

        if (index === lastNewIndex) cell.classList.add("new");
        if (lastMergedIndices.includes(index)) cell.classList.add("pop");
      });

      const bestScore = stats[mode].bestScore;
      scoreEl.textContent = String(score);
      bestEl.textContent = String(bestScore);
      scoreEl.dataset.digits = String(score).length;
      bestEl.dataset.digits = String(bestScore).length;

      modeNameEl.textContent = MODES[mode].name;
      const historyLimit = MODES[mode].historyLimit;
      undoStatusEl.textContent = historyLimit === 0
        ? "без возврата"
        : "доступно: " + history.length + " из " + historyLimit;
      undoBadge.textContent = String(history.length);
      undoBadge.hidden = historyLimit === 0;
      undoBtn.disabled = !hasActiveGame || history.length === 0;

      if (gameOver) {
        gameStateAction.textContent = "Игра окончена";
        gameStateAction.classList.add("game-over");
      } else {
        gameStateAction.textContent = "Выйти в меню";
        gameStateAction.classList.remove("game-over");
      }

      checkpointAction.hidden = !hasActiveGame || mode !== "easy" || gameOver;

      lastNewIndex = -1;
      lastMergedIndices = [];
    }

    function emptyPositions() {
      const result = [];
      for (let row = 0; row < N; row++) {
        for (let col = 0; col < N; col++) {
          if (grid[row][col] === 0) result.push([row, col]);
        }
      }
      return result;
    }

    function addTile() {
      const positions = emptyPositions();
      if (!positions.length) return;

      const [row, col] = positions[Math.floor(Math.random() * positions.length)];
      grid[row][col] = Math.random() < .9 ? 2 : 4;
      lastNewIndex = row * N + col;
    }

    function startNewGame(modeId) {
      mode = modeId;
      grid = emptyGrid();
      score = 0;
      history = [];
      gameOver = false;
      finishedCounted = false;
      reached2048Counted = false;
      movesCount = 0;
      undosUsed = 0;
      mergesCount = 0;
      hasActiveGame = true;

      addTile();
      addTile();

      stats[mode].gamesStarted += 1;
      updatePeriodProgress({ games: 1, maxTile: getMaxTile() });
      checkAllTimeAchievements();
      saveStats();
      saveActive();
      hideMenu();
      closeModal();
      render();
    }

    function sameGrid(a, b) {
      return a.every((row, r) => row.every((value, c) => value === b[r][c]));
    }

    function mergeLine(line) {
      const compact = line.filter((value) => value !== 0);
      const result = [];
      const mergedPositions = [];
      let gained = 0;

      for (let index = 0; index < compact.length; index++) {
        if (index + 1 < compact.length && compact[index] === compact[index + 1]) {
          const merged = compact[index] * 2;
          result.push(merged);
          mergedPositions.push(result.length - 1);
          gained += merged;
          index++;
        } else {
          result.push(compact[index]);
        }
      }

      while (result.length < N) result.push(0);
      return { line: result, gained, mergedPositions };
    }

    function move(direction) {
      if (!hasActiveGame || gameOver || menuScreen.classList.contains("show") || modalLayer.classList.contains("show")) return;

      const before = copyGrid(grid);
      const beforeScore = score;
      const next = emptyGrid();
      const mergedCells = [];
      let gained = 0;
      let mergesMade = 0;

      for (let fixed = 0; fixed < N; fixed++) {
        const line = [];

        for (let moving = 0; moving < N; moving++) {
          if (direction === "left") line.push(grid[fixed][moving]);
          if (direction === "right") line.push(grid[fixed][N - 1 - moving]);
          if (direction === "up") line.push(grid[moving][fixed]);
          if (direction === "down") line.push(grid[N - 1 - moving][fixed]);
        }

        const merged = mergeLine(line);
        gained += merged.gained;
        mergesMade += merged.mergedPositions.length;

        for (let moving = 0; moving < N; moving++) {
          let row;
          let col;

          if (direction === "left") { row = fixed; col = moving; }
          if (direction === "right") { row = fixed; col = N - 1 - moving; }
          if (direction === "up") { row = moving; col = fixed; }
          if (direction === "down") { row = N - 1 - moving; col = fixed; }

          next[row][col] = merged.line[moving];
          if (merged.mergedPositions.includes(moving)) mergedCells.push(row * N + col);
        }
      }

      if (sameGrid(before, next)) return;

      const historyLimit = MODES[mode].historyLimit;
      if (historyLimit > 0) {
        history.push({ grid: before, score: beforeScore });
        if (history.length > historyLimit) history.shift();
      }

      grid = next;
      score += gained;
      movesCount += 1;
      mergesCount += mergesMade;
      stats[mode].totalMoves += 1;
      stats[mode].totalScore += gained;
      stats[mode].totalMerges += mergesMade;
      lastMergedIndices = mergedCells;
      addTile();

      board.classList.remove("move-left", "move-right", "move-up", "move-down");
      void board.offsetWidth;
      board.classList.add("move-" + direction);
      setTimeout(() => board.classList.remove("move-left", "move-right", "move-up", "move-down"), 170);

      gameOver = !canMove();
      updateCurrentStats();

      if (gameOver && !finishedCounted) {
        stats[mode].gamesFinished += 1;
        if (undosUsed === 0) {
          stats[mode].noUndoFinishes += 1;
          stats[mode].bestNoUndoScore = Math.max(stats[mode].bestNoUndoScore, score);
        }
        finishedCounted = true;
      }

      updatePeriodProgress({
        moves: 1,
        score: gained,
        merges: mergesMade,
        maxTile: getMaxTile()
      });
      checkAllTimeAchievements();
      saveActive();
      render();

      if (settings.vibration && vibrationSupported && gained > 0) {
        try { navigator.vibrate(15); } catch (_) {}
      }
    }

    function canMove() {
      if (emptyPositions().length) return true;

      for (let row = 0; row < N; row++) {
        for (let col = 0; col < N; col++) {
          const value = grid[row][col];
          if (row + 1 < N && grid[row + 1][col] === value) return true;
          if (col + 1 < N && grid[row][col + 1] === value) return true;
        }
      }
      return false;
    }

    function undo() {
      if (!history.length) return;

      const previous = history.pop();
      grid = copyGrid(previous.grid);
      score = previous.score;
      gameOver = false;
      undosUsed += 1;
      stats[mode].totalUndos += 1;
      saveStats();
      saveActive();
      render();
    }

    function showOnly(section) {
      [mainMenu, modesMenu, achievementsMenu, statsMenu, settingsMenu, profilesMenu].forEach((item) => {
        item.hidden = item !== section;
      });

      requestAnimationFrame(() => {
        menuScreen.scrollTop = 0;
      });
    }

    function lastPlayableMode() {
      const saved = safeGet(LAST_MODE_KEY);
      if (saved && loadModeState(saved)) return saved;
      return Object.keys(MODES).find((modeId) => loadModeState(modeId)) || null;
    }

    function updateMainMenu() {
      const lastMode = lastPlayableMode();
      const state = lastMode ? loadModeState(lastMode) : null;

      currentProfileName.textContent = currentProfile().name;
      menuRecord.textContent = "Лучший результат: " + formatNumber(bestAcrossModes());
      continueButton.disabled = !state;
      continueInfo.textContent = state
        ? MODES[lastMode].name + " · " + formatNumber(state.score) + " очков · плитка " + state.maxTile
        : "Нет текущей партии";

    function renderGoalCard(goal, progress) {
      const value = Number(progress[goal.metric]) || 0;

      const card = document.createElement("div");

            '<div class="progress-track"><div class="progress-fill" style="width:' + percent + '%"></div></div>' +

    function collectBackupData() {
      flushActiveTime();
      saveUsage();
      saveActive();

      const storage = {};
      try {
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith("mika2048")) storage[key] = localStorage.getItem(key);
        }
      } catch (_) {}

      return {
        format: BACKUP_FORMAT,
        backupVersion: BACKUP_VERSION,
        appVersion: APP_VERSION,
        exportedAt: new Date().toISOString(),
        storage
      };
    }

    async function exportBackup() {
      const data = JSON.stringify(collectBackupData(), null, 2);
      const filename = "2048-backup-" + new Date().toISOString().slice(0, 10) + ".json";
      const blob = new Blob([data], { type: "application/json" });
      const file = new File([blob], filename, { type: "application/json" });

      try {
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ title: "Резервная копия 2048", files: [file] });
          showToast("Резервная копия подготовлена");
          return;
        }
      } catch (error) {
        if (error && error.name === "AbortError") return;
      }

      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast("Резервная копия сохранена");
    }

    function validateBackup(data) {
      if (!data || data.format !== BACKUP_FORMAT || typeof data.storage !== "object") return false;
      const entries = Object.entries(data.storage);
      if (!entries.length) return false;
      return entries.every(([key, value]) => key.startsWith("mika2048") && typeof value === "string");
    }

    function requestImportBackup(data) {
      openModal(
        "Восстановить данные?",
        "Текущие профили, партии, достижения и настройки будут заменены данными из резервной копии.",
        [
          { label: "Отмена", kind: "ghost", action: closeModal },
          {
            label: "Восстановить",
            kind: "primary",
            action: () => {
              try {
                const keys = [];
                for (let i = 0; i < localStorage.length; i++) {
                  const key = localStorage.key(i);
                  if (key && key.startsWith("mika2048")) keys.push(key);
                }
                keys.forEach((key) => localStorage.removeItem(key));
                Object.entries(data.storage).forEach(([key, value]) => localStorage.setItem(key, value));
                location.reload();
              } catch (_) {
                closeModal();
                showToast("Не удалось восстановить данные");
              }
            }
          }
        ]
      );
    }

    async function checkForUpdate(status, button) {
      status.textContent = "Проверяем обновление…";
      button.disabled = true;

      try {
        const response = await fetch("./index.html?update=" + Date.now(), { cache: "no-store" });
        const text = await response.text();
        const match = text.match(/const APP_VERSION = "([^"]+)"/);
        const remoteVersion = match ? match[1] : APP_VERSION;

        if (remoteVersion !== APP_VERSION) {
          status.textContent = "Доступна версия v" + remoteVersion + ". Обновление загружается…";
          const registration = await navigator.serviceWorker?.getRegistration();
          if (registration) await registration.update();
        } else {
          status.textContent = "Установлена актуальная версия v" + APP_VERSION + ".";
        }
      } catch (_) {
        status.textContent = "Не удалось проверить обновление. Проверь подключение к интернету.";
      } finally {
        button.disabled = false;
      }
    }

        rename.textContent = "✎";
        rename.setAttribute("aria-label", "Переименовать");
        rename.addEventListener("click", () => {
          const next = window.prompt("Новое имя игрока", profile.name);
          if (!next || !next.trim()) return;
          profile.name = next.trim().slice(0, 24);
          saveProfiles();
          renderProfiles();
          updateMainMenu();
        });
        actions.appendChild(rename);

        const remove = document.createElement("button");
        remove.className = "profile-mini danger";
        remove.textContent = "×";
        remove.setAttribute("aria-label", "Удалить");
        remove.disabled = profiles.length === 1;
        remove.addEventListener("click", () => requestDeleteProfile(profile));
        actions.appendChild(remove);

        row.append(main, actions);
        list.appendChild(row);
      });

      card.appendChild(list);

      const create = document.createElement("section");
      create.className = "profiles-card";
      create.innerHTML = "<h3>Новый игрок</h3>";
      const form = document.createElement("div");
      form.className = "profile-create";
      const input = document.createElement("input");
      input.maxLength = 24;
      input.placeholder = profiles.length >= 5 ? "Максимум 5 игроков" : "Имя игрока";
      input.disabled = profiles.length >= 5;
      const add = document.createElement("button");
      add.textContent = "Добавить";
      add.disabled = profiles.length >= 5;
      add.addEventListener("click", () => {
        const name = input.value.trim();
        if (!name) return;
        const profile = { id: createProfileId(), name: name.slice(0, 24), createdAt: Date.now() };
        profiles.push(profile);
        saveProfiles();
        switchProfile(profile.id);
      });
      form.append(input, add);
      create.appendChild(form);
      profilesContent.append(card, create);
    }

    function requestDeleteProfile(profile) {
      if (profiles.length === 1) return;
      openModal(
        "Удалить игрока?",
        "Будут удалены партии, достижения и статистика игрока «" + profile.name + "».",
        [
          { label: "Отмена", kind: "ghost", action: closeModal },
          {
            label: "Удалить",
            kind: "primary",
            action: () => {
              const deletingCurrent = profile.id === currentProfileId;
              profiles = profiles.filter((item) => item.id !== profile.id);
              removeProfileData(profile.id);
              saveProfiles();
              closeModal();
              if (deletingCurrent) {
                rawSet(CURRENT_PROFILE_KEY, profiles[0].id);
                location.reload();
              } else {
                renderProfiles();
                showToast("Игрок удалён");
              }
            }
          }
        ]
      );
    }

    function openModal(title, text, buttons) {
      modalTitle.textContent = title;
      modalText.textContent = text;
      modalActions.innerHTML = "";

      buttons.forEach((config) => {
        const button = document.createElement("button");
        button.className = "modal-button " + (config.kind || "");
        button.textContent = config.label;
        button.addEventListener("click", config.action);
        modalActions.appendChild(button);
      });

      modalLayer.classList.add("show");
    }

    function closeModal() {
      modalLayer.classList.remove("show");
      modalActions.innerHTML = "";
    }

    function requestNewModeGame(modeId) {
      const oldState = loadModeState(modeId);
      if (oldState && !settings.confirmNewGame) {
        startNewGame(modeId);
        return;
      }

      if (!oldState) {
        startNewGame(modeId);
        return;
      }

      if (modeId !== "easy") {
        openModal(
          "Начать новую игру?",
          MODES[modeId].name + ". Текущая партия этого режима будет заменена.",
          [
            { label: "Отмена", kind: "ghost", action: closeModal },
            {
              label: "Начать",
              kind: "primary",
              action: () => startNewGame(modeId)
            }
          ]
        );
        return;
      }

      openModal(
        "Начать новую лёгкую игру?",
        "Текущая партия будет заменена. При необходимости сначала сохрани её как контрольную точку.",
        [
          { label: "Отмена", kind: "ghost", action: closeModal },
          {
            label: "Начать без сохранения",
            action: () => startNewGame("easy")
          },
          {
            label: "Сохранить точку и начать",
            kind: "primary",
            action: () => {
              const result = addCheckpoint(oldState, true);

              if (result === "full") {
                closeModal();
                renderModes(true);
                showToast("Сначала удали одну из трёх контрольных точек");
                return;
              }

              startNewGame("easy");
            }
          }
        ]
      );
    }

    function requestRestart() {
      if (!hasActiveGame) return;
      if (!settings.confirmNewGame) {
        startNewGame(mode);
        return;
      }

      const possibleUndos = history.length;
      const reminder = possibleUndos > 0
        ? "Можно откатить ещё " + possibleUndos + " ход" + (possibleUndos === 1 ? "" : "ов") + " и попробовать продолжить 😊"
        : "Доступных возвратов сейчас нет.";

      const buttons = [
        { label: "Отмена", kind: "ghost", action: closeModal },
        {
          label: "В меню",
          action: () => {
            closeModal();
            showMenu();
          }
        },
        {
          label: "Начать без сохранения",
          kind: mode === "easy" ? "" : "primary",
          action: () => startNewGame(mode)
        }
      ];

      if (mode === "easy") {
        buttons.push({
          label: "Сохранить точку и начать",
          kind: "primary",
          action: () => {
            const result = createCheckpoint(true);

            if (result === "full") {
              closeModal();
              showMenu();
              renderModes(true);
              showOnly(modesMenu);
              showToast("Сначала удали одну из трёх контрольных точек");
              return;
            }

            startNewGame("easy");
          }
        });
      }

      openModal(
        gameOver ? "Точно начать заново?" : "Начать новую игру?",
        reminder,
        buttons
      );
    }

    gameStateAction.addEventListener("click", () => {
      if (gameOver) {
        requestRestart();
        return;
      }

      showMenu();
    });

    checkpointAction.addEventListener("click", () => {
      createCheckpoint(false);
    });

    undoBtn.addEventListener("click", undo);
    restartBtn.addEventListener("click", requestRestart);

    continueButton.addEventListener("click", () => {
      const lastMode = lastPlayableMode();
      if (lastMode) continueMode(lastMode);
    });

    modesButton.addEventListener("click", () => {
      renderModes();
      showOnly(modesMenu);
    });

    achievementsButton.addEventListener("click", () => {
      renderAchievements();
      showOnly(achievementsMenu);
    });

    statsButton.addEventListener("click", () => {
      flushActiveTime();
      renderStats();
      showOnly(statsMenu);
    });

    settingsButton.addEventListener("click", () => {
      renderSettings();
      showOnly(settingsMenu);
    });

    profileButton.addEventListener("click", () => {
      renderProfiles();
      showOnly(profilesMenu);
    });

    profilesBackButton.addEventListener("click", () => {
      updateMainMenu();
      showOnly(mainMenu);
    });

    document.querySelectorAll("[data-back-main]").forEach((button) => {
      button.addEventListener("click", () => {
        updateMainMenu();
        showOnly(mainMenu);
      });
    });

    let startX = 0;
    let startY = 0;
    let tracking = false;

    function beginSwipe(x, y) {
      tracking = true;
      startX = x;
      startY = y;
    }

    function finishSwipe(x, y) {
      if (!tracking) return;
      tracking = false;

      const dx = x - startX;
      const dy = y - startY;
      if (Math.hypot(dx, dy) < 25) return;

      usage.totalSwipes += 1;
      markActivity();
      saveUsage();
      checkAllTimeAchievements();

      if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? "right" : "left");
      else move(dy > 0 ? "down" : "up");
    }

    function isInteractiveTarget(target) {
      return Boolean(target && target.closest && target.closest("button, a, input, select, textarea"));
    }

    document.addEventListener("touchstart", (event) => {
      markActivity();
      if (menuScreen.classList.contains("show")) return;
      if (!event.touches.length || isInteractiveTarget(event.target)) return;
      const touch = event.touches[0];
      beginSwipe(touch.clientX, touch.clientY);
    }, { passive: true });

    document.addEventListener("touchmove", (event) => {
      if (menuScreen.classList.contains("show")) return;
      event.preventDefault();
    }, { passive: false });

    document.addEventListener("touchend", (event) => {
      if (!tracking || !event.changedTouches.length) return;
      const touch = event.changedTouches[0];
      finishSwipe(touch.clientX, touch.clientY);
    }, { passive: true });

    document.addEventListener("touchcancel", () => { tracking = false; }, { passive: true });
    document.addEventListener("gesturestart", (event) => event.preventDefault(), { passive: false });

    document.addEventListener("mousedown", (event) => {
      markActivity();
      if (!isInteractiveTarget(event.target)) beginSwipe(event.clientX, event.clientY);
    });

    window.addEventListener("mouseup", (event) => finishSwipe(event.clientX, event.clientY));

    document.addEventListener("keydown", (event) => {
      markActivity();
      const map = {
        ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down",
        a: "left", d: "right", w: "up", s: "down",
        A: "left", D: "right", W: "up", S: "down"
      };

      if (!map[event.key]) return;
      event.preventDefault();
      move(map[event.key]);
    }, { passive: false });

    document.addEventListener("visibilitychange", () => {
      flushActiveTime();
      saveUsage();
      if (document.visibilityState === "hidden") saveActive();
      else { activeClockAt = Date.now(); markActivity(); }
    });

    setInterval(() => {
      flushActiveTime();
      saveUsage();
      checkAllTimeAchievements();
    }, 10000);

    window.addEventListener("pagehide", () => {
      flushActiveTime();
      saveUsage();
      saveActive();
    });
    window.addEventListener("beforeunload", () => {
      flushActiveTime();
      saveUsage();
      saveActive();
    });

    applySettings();
    currentProfileName.textContent = currentProfile().name;
    const hadAchievementData = Boolean(safeGet(ACHIEVEMENTS_KEY));
    migrateOldVersion();
    trimLegacyCheckpoints();
    ensurePeriods();
    checkAllTimeAchievements(!hadAchievementData);

    const initialMode = lastPlayableMode();
    if (initialMode) {
      const initialState = loadModeState(initialMode);
      if (initialState) applyState(initialState);
    }

    render();
    showMenu();
  })();
  </script>

  <script>
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      let refreshing = false;

      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (refreshing) return;
        refreshing = true;
        location.reload();
      });

      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").then(function (registration) {
          registration.update();
        }).catch(function () {});
      });
    }
  </script>
</body>
</html>
